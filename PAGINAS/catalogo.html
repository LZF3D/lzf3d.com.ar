<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Completo — LZF3D</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0b;
  --surface: #111114;
  --surface2: #18181d;
  --azul: #2563eb;
  --azul2: #3b82f6;
  --naranja: #ff6b2b;
  --naranja2: #ff8c42;
  --blanco: #f0eeea;
  --gris: #4a4a52;
  --gris2: #2a2a30;
  --texto: #c8c5be;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--blanco); font-family: 'Barlow', sans-serif; overflow-x: hidden; }

nav {
  position: fixed; top: 0; width: 100%; z-index: 500;
  padding: 20px 60px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(10,10,11,0.92); backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(37,99,235,0.15);
}
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 3px; color: var(--blanco); text-decoration: none; }
.logo span { color: var(--azul); }
.nav-back {
  background: transparent; color: var(--texto);
  border: 1px solid var(--gris2); padding: 9px 22px;
  font-family: 'Space Mono', monospace; font-size: 0.65rem;
  letter-spacing: 2px; text-transform: uppercase;
  transition: border-color 0.2s, color 0.2s;
  clip-path: polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
  text-decoration: none; display: inline-block;
}
.nav-back:hover { border-color: var(--azul); color: var(--azul); }

/* HERO */
.hero-cat {
  padding: 140px 80px 80px;
  position: relative; overflow: hidden;
  border-bottom: 1px solid var(--gris2);
}
.hero-cat::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(37,99,235,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(37,99,235,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
}
.hero-inner { position: relative; z-index: 1; }
.eyebrow {
  font-family: 'Space Mono', monospace; font-size: 0.65rem;
  letter-spacing: 3px; text-transform: uppercase; color: var(--azul);
  margin-bottom: 16px; display: flex; align-items: center; gap: 12px;
}
.eyebrow::before { content: ''; width: 32px; height: 1px; background: var(--azul); }
.hero-cat h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3rem, 6vw, 5.5rem);
  letter-spacing: 2px; line-height: 0.95; margin-bottom: 24px;
}
.hero-cat h1 span { color: var(--naranja); }
.hero-cat p { font-size: 0.95rem; color: var(--texto); line-height: 1.7; max-width: 560px; }

/* FILTROS */
.catalogo-wrap { max-width: 1300px; margin: 0 auto; padding: 60px 80px 100px; }

.filtros {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 48px;
  align-items: center;
}
.filtros-label {
  font-family: 'Space Mono', monospace; font-size: 0.6rem;
  color: var(--gris); letter-spacing: 2px; text-transform: uppercase;
  margin-right: 8px;
}
.filtro-btn {
  background: var(--surface); border: 1px solid var(--gris2);
  color: var(--texto); padding: 9px 20px;
  font-family: 'Space Mono', monospace; font-size: 0.62rem;
  letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
  transition: all 0.2s;
  clip-path: polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
}
.filtro-btn:hover { border-color: var(--azul); color: var(--azul); }
.filtro-btn.active { background: var(--naranja); border-color: var(--naranja); color: #0a0a0b; font-weight: 700; }

/* CONTADOR */
.results-info {
  font-family: 'Space Mono', monospace; font-size: 0.65rem;
  color: var(--gris); letter-spacing: 1px; margin-bottom: 32px;
}
.results-info span { color: var(--naranja); }

/* GRID */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 2px;
}

.prod-card {
  background: var(--surface);
  position: relative; overflow: hidden;
  transition: transform 0.2s;
  cursor: pointer;
}
.prod-card:hover { transform: translateY(-3px); z-index: 2; }
.prod-card::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: var(--naranja); transform: scaleX(0); transform-origin: left;
  transition: transform 0.3s;
}
.prod-card:hover::after { transform: scaleX(1); }

.prod-img {
  height: 200px;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  border-bottom: 1px solid var(--gris2);
}
.prod-img-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 4rem;
  background: linear-gradient(135deg, var(--surface2), rgba(37,99,235,0.05));
}
.prod-img img {
  width: 100%; height: 100%; object-fit: cover;
}

.prod-badge {
  position: absolute; top: 12px; left: 12px;
  background: var(--naranja); color: #0a0a0b;
  font-family: 'Space Mono', monospace; font-size: 0.55rem;
  font-weight: 700; letter-spacing: 1.5px; padding: 4px 10px;
  text-transform: uppercase;
  clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);
}
.prod-badge.cyan { background: var(--azul); color: #fff; }

.prod-body { padding: 20px; }
.prod-cat {
  font-family: 'Space Mono', monospace; font-size: 0.55rem;
  color: var(--azul); letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 8px;
}
.prod-name {
  font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem;
  letter-spacing: 1px; margin-bottom: 8px; line-height: 1.1;
}
.prod-desc {
  font-size: 0.78rem; color: var(--texto); line-height: 1.6;
  margin-bottom: 16px;
}
.prod-footer {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.prod-precio-antes {
  font-family: 'Space Mono', monospace; font-size: 0.6rem;
  color: var(--gris); text-decoration: line-through;
}
.prod-precio {
  font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem;
  color: var(--naranja); letter-spacing: 1px;
}
.btn-add {
  background: var(--azul); color: #fff; border: none;
  padding: 9px 16px;
  font-family: 'Space Mono', monospace; font-size: 0.6rem;
  font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; white-space: nowrap;
  clip-path: polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
  transition: background 0.2s;
}
.btn-add:hover { background: var(--azul2); }

/* EMPTY STATE */
.empty-state {
  grid-column: 1/-1; text-align: center; padding: 80px;
  color: var(--gris);
  font-family: 'Space Mono', monospace; font-size: 0.8rem; letter-spacing: 2px;
}

/* CARRITO FLOTANTE */
.cart-float { display: none; }
.cart-float.visible { display: block; }
#cart-panel { position:fixed;top:0;right:-420px;width:400px;max-width:100vw;height:100vh;background:#111114;border-left:1px solid #2a2a30;z-index:501;display:flex;flex-direction:column;transition:right 0.3s ease; }
#cart-panel.open { right: 0; }
  position: fixed; bottom: 28px; left: 28px; z-index: 400;
  background: var(--naranja); color: #0a0a0b;
  border: none; padding: 14px 24px;
  font-family: 'Space Mono', monospace; font-size: 0.7rem; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
  clip-path: polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
  display: none; transition: opacity 0.2s;
}
.cart-float:hover { opacity: 0.85; }
.cart-float.visible { display: block; }

/* WA FLOAT */
.wa-float {
  position: fixed; bottom: 28px; right: 28px;
  background: #25D366; color: #fff; width: 54px; height: 54px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
  z-index: 400; text-decoration: none;
  box-shadow: 0 4px 20px rgba(37,211,102,0.4);
  animation: wa-pulse 2s ease-in-out infinite;
}
@keyframes wa-pulse { 0%,100% { box-shadow: 0 4px 20px rgba(37,211,102,0.4); } 50% { box-shadow: 0 4px 32px rgba(37,211,102,0.7); } }

/* TOAST */
.toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--surface); border: 1px solid var(--naranja);
  color: var(--blanco); padding: 14px 28px;
  font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 1px;
  opacity: 0; transition: all 0.3s; z-index: 600; white-space: nowrap;
  clip-path: polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

footer {
  background: var(--surface); border-top: 1px solid rgba(37,99,235,0.15);
  padding: 32px 80px; display: flex; align-items: center; justify-content: space-between;
}
footer p { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--gris); letter-spacing: 1px; }
.footer-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 2px; color: var(--blanco); }
.footer-logo span { color: var(--azul); }

@media(max-width:1100px) { .cat-grid { grid-template-columns: repeat(3,1fr); } }
@media(max-width:768px) {
  nav { padding: 14px 20px; }
  .hero-cat { padding: 100px 20px 48px; }
  .catalogo-wrap { padding: 32px 20px 60px; }
  .cat-grid { grid-template-columns: repeat(2,1fr); }
  footer { flex-direction: column; gap: 12px; padding: 24px 20px; text-align: center; }
}
@media(max-width:480px) {
  .cat-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav>
  <a href="../index.html" class="logo">LZF<span>3D</span></a>
  <div style="display:flex;align-items:center;gap:12px;">

<div class="catalogo-wrap">

</div>

<div class="toast" id="toast"></div>
<!-- CART PANEL -->
<div id="cart-overlay" onclick="toggleCartPanel()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;"></div>
<div id="cart-panel" style="position:fixed;top:0;right:-420px;width:400px;max-width:100vw;height:100vh;background:#111114;border-left:1px solid #2a2a30;z-index:501;display:flex;flex-direction:column;transition:right 0.3s ease;padding:0;">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:24px 28px;border-bottom:1px solid #2a2a30;">
    <h3 style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;">CARRITO</h3>
    <button onclick="toggleCartPanel()" style="background:none;border:none;color:#f0eeea;font-size:1.2rem;cursor:pointer;">✕</button>
  </div>
  <div id="cart-panel-items" style="flex:1;overflow-y:auto;padding:0 28px;"></div>
  <div id="cart-panel-footer" style="display:none;padding:24px 28px;border-top:1px solid #2a2a30;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <span style="font-family:monospace;font-size:0.65rem;letter-spacing:2px;color:#c8c5be;">TOTAL ARS</span>
      <span id="cart-panel-total" style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:#ff6b2b;"></span>
    </div>
    <button onclick="finalizarWA()" style="display:block;width:100%;text-align:center;background:#25D366;color:#0a0a0b;border:none;padding:16px;font-family:monospace;font-size:0.75rem;font-weight:700;letter-spacing:2px;cursor:pointer;clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);">💬 FINALIZAR POR WHATSAPP →</button>
  </div>
</div>

<button class="cart-float" id="cart-float" onclick="toggleCartPanel()">🛒 CARRITO (<span id="cart-count">0</span>)</button>
<a class="wa-float" href="https://wa.me/5493513828277" target="_blank">💬</a>

<script>
const prods = [
  { id:1,  name:'Vaso Chop Edición Especial',   cat:'Vasos Chop',       price:3500, emoji:'🍺', badge:'nuevo',  desc:'Vaso chop en PETG resistente. 500ml. Diseño exclusivo LZF3D. Apto líquidos fríos.' },
  { id:2,  name:'Vaso Chop Calavera',            cat:'Vasos Chop',       price:3800, emoji:'💀', badge:'nuevo',  desc:'Diseño calavera en relieve. PETG premium 500ml. Apto líquidos. Edición limitada.' },
  { id:3,  name:'Vaso Chop Dragón',              cat:'Vasos Chop',       price:4000, precioAntes:4800, emoji:'🐉', badge:'oferta', desc:'Relieve de dragón en toda la superficie. PETG 500ml. Muy resistente.' },
  { id:4,  name:'Vaso Chop Geométrico',          cat:'Vasos Chop',       price:3200, emoji:'🔶', badge:'',       desc:'Diseño geométrico moderno. PETG 400ml. Disponible en varios colores.' },
  { id:5,  name:'Figura Gengar',                 cat:'Miniaturas',       price:3200, emoji:'👾', badge:'nuevo',  desc:'Figura de Gengar en PLA de alta detalle. 12cm de alto. Ideal para coleccionistas.' },
  { id:6,  name:'Figura Bulbasaur',              cat:'Miniaturas',       price:2900, emoji:'🌱', badge:'',       desc:'Bulbasaur en PLA bicolor. 10cm. Diseño fiel al original. Pintado a mano disponible.' },
  { id:7,  name:'Miniatura Guerrero Fantasy',    cat:'Miniaturas',       price:2800, precioAntes:3500, emoji:'⚔️', badge:'oferta', desc:'Figura de guerrero medieval en PLA. 10cm de alto. Alta precisión en detalles.' },
  { id:8,  name:'Pack Figuras x3',               cat:'Miniaturas',       price:5500, precioAntes:6800, emoji:'🧸', badge:'oferta', desc:'Set de 3 figuras coleccionables en PLA. Diseños exclusivos LZF3D.' },
  { id:9,  name:'Maceta Geométrica',             cat:'Decoración Hogar', price:2200, emoji:'🌿', badge:'',       desc:'Maceta con diseño geométrico moderno. PLA mate. Varios colores disponibles.' },
  { id:10, name:'Lámpara Lunar de Mesa',         cat:'Decoración Hogar', price:4500, precioAntes:5200, emoji:'🌙', badge:'oferta', desc:'Textura lunar en PLA translúcido. Luz LED cálida incluida. Base USB.' },
  { id:11, name:'Cuadro Decorativo 3D',          cat:'Decoración Hogar', price:2500, emoji:'🔷', badge:'',       desc:'Cuadro con relieve geométrico 3D. PLA mate negro/blanco. 20x20cm. Para colgar.' },
  { id:12, name:'Portavelas Hexagonal',          cat:'Decoración Hogar', price:1900, emoji:'🕯️', badge:'nuevo',  desc:'Portavelas con diseño hexagonal en PLA mate. Apto velas pequeñas y tealights.' },
  { id:13, name:'Soporte Auriculares Gamer',     cat:'Accesorios',       price:1800, emoji:'🎧', badge:'',       desc:'Soporte de escritorio en PLA rígido. Compatible con todos los auriculares.' },
  { id:14, name:'Soporte Celular Escritorio',    cat:'Accesorios',       price:1500, emoji:'📱', badge:'',       desc:'Soporte ajustable para celular. PLA rígido. Compatible con todos los modelos.' },
  { id:15, name:'Organizador Modular',           cat:'Accesorios',       price:2600, emoji:'🗂️', badge:'nuevo',  desc:'Sistema modular para escritorio. PLA rígido. Varios compartimentos encastrables.' },
  { id:16, name:'Llavero Personalizable',        cat:'Accesorios',       price:800,  emoji:'🔑', badge:'nuevo',  desc:'Llavero en PLA. Varios diseños disponibles. Liviano y muy resistente.' },
  { id:17, name:'Auto de Carrera Coleccionable', cat:'Juguetes',         price:2200, emoji:'🏎️', badge:'',       desc:'Auto de carrera en PLA detallado. 15cm de largo. Ruedas móviles incluidas.' },
  { id:18, name:'Rompecabezas 3D Cubo',          cat:'Juguetes',         price:3000, precioAntes:3600, emoji:'🧩', badge:'oferta', desc:'Rompecabezas 3D armable en PLA. 8 piezas encajables. Varios colores.' },
];

// ── CARRITO con localStorage compartido ──────────────────────────────────────
function saveCarrito() {
  localStorage.setItem('lzf3d_carrito', JSON.stringify(carrito));
}
function loadCarrito() {
  try { return JSON.parse(localStorage.getItem('lzf3d_carrito') || '[]'); } catch(e) { return []; }
}
let carrito = loadCarrito();

function fmt(n) { return '$' + n.toLocaleString('es-AR'); }

// ── PANEL CARRITO ─────────────────────────────────────────────────────────────
function toggleCartPanel() {
  const panel   = document.getElementById('cart-panel');
  const overlay = document.getElementById('cart-overlay');
  const isOpen  = panel.style.right === '0px';
  panel.style.right   = isOpen ? '-420px' : '0px';
  overlay.style.display = isOpen ? 'none' : 'block';
}

function updateCartUI() {
  const totalQty  = carrito.reduce((s,x) => s + x.qty, 0);
  const totalPeso = carrito.reduce((s,x) => s + x.price * x.qty, 0);

  // Badge nav y flotante
  const countEl  = document.getElementById('cart-count');
  const navCount = document.getElementById('nav-count');
  const floatBtn = document.getElementById('cart-float');
  if (countEl)  countEl.textContent  = totalQty;
  if (navCount) navCount.textContent = totalQty;
  if (floatBtn) floatBtn.classList.toggle('visible', totalQty > 0);

  // Panel interior
  const panel  = document.getElementById('cart-panel-items');
  const footer = document.getElementById('cart-panel-footer');
  const totalEl = document.getElementById('cart-panel-total');
  if (!panel) return;

  if (!carrito.length) {
    panel.innerHTML = '<div style="text-align:center;padding:60px 20px;font-family:monospace;font-size:0.7rem;color:#4a4a52;letter-spacing:2px;">[ CARRITO VACÍO ]</div>';
    if (footer) footer.style.display = 'none';
  } else {
    panel.innerHTML = carrito.map(x => `
      <div style="display:flex;gap:14px;align-items:center;padding:16px 0;border-bottom:1px solid #2a2a30;">
        <div style="font-size:2rem;flex-shrink:0;">${x.emoji}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${x.name}</div>
          <div style="font-family:monospace;font-size:0.65rem;color:#c8c5be;">${fmt(x.price)} × ${x.qty} = ${fmt(x.price * x.qty)}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
          <button onclick="changeQty(${x.id}, 1)"  style="background:#2563eb;color:#fff;border:none;width:26px;height:26px;cursor:pointer;font-weight:bold;font-size:1rem;">+</button>
          <button onclick="changeQty(${x.id}, -1)" style="background:#2a2a30;color:#c8c5be;border:none;width:26px;height:26px;cursor:pointer;font-size:1rem;">−</button>
        </div>
      </div>
    `).join('');
    if (footer)  footer.style.display  = 'block';
    if (totalEl) totalEl.textContent   = fmt(totalPeso);
  }
}

function changeQty(id, delta) {
  const item = carrito.find(x => x.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) carrito = carrito.filter(x => x.id !== id);
  saveCarrito();
  updateCartUI();
}

// ── AGREGAR AL CARRITO ────────────────────────────────────────────────────────
function addCart(id) {
  const p  = prods.find(x => x.id === id);
  if (!p) return;
  const ex = carrito.find(x => x.id === id);
  if (ex) ex.qty++;
  else carrito.push({ id:p.id, name:p.name, price:p.price, emoji:p.emoji, qty:1 });
  saveCarrito();
  updateCartUI();
  showToast('[ ' + p.name.toUpperCase() + ' AGREGADO ]');
}

// ── FINALIZAR POR WHATSAPP ────────────────────────────────────────────────────
function finalizarWA() {
  if (!carrito.length) { showToast('[ AGREGÁ PRODUCTOS PRIMERO ]'); return; }
  const lineas = carrito.map(x => '- ' + x.name + ' x' + x.qty + ' = ' + fmt(x.price * x.qty)).join('\n');
  const total  = carrito.reduce((s,x) => s + x.price * x.qty, 0);
  const texto  = 'Hola LZF3D! Quiero hacer este pedido:\n\n' + lineas + '\n\nTOTAL: ' + fmt(total) + '\n\n¿Me confirman disponibilidad y envío?';
  window.open('https://wa.me/5493513828277?text=' + encodeURIComponent(texto), '_blank');
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── FILTROS ───────────────────────────────────────────────────────────────────
function filtrar(cat, btn) {
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const lista = cat ? prods.filter(p => p.cat === cat) : prods;
  renderCat(lista);
}

// ── RENDER PRODUCTOS ──────────────────────────────────────────────────────────
function renderCat(lista) {
  const grid = document.getElementById('cat-grid');
  if (!grid) return;
  document.getElementById('count').textContent = lista.length;
  if (!lista.length) {
    grid.innerHTML = '<div class="empty-state">SIN PRODUCTOS EN ESTA CATEGORÍA</div>';
    return;
  }
  grid.innerHTML = lista.map(p => `
    <div class="prod-card">
      <div class="prod-img">
        ${p.badge === 'oferta' ? '<div class="prod-badge">OFERTA</div>' : ''}
        ${p.badge === 'nuevo'  ? '<div class="prod-badge cyan">NUEVO</div>' : ''}
        <div class="prod-img-placeholder">${p.emoji}</div>
      </div>
      <div class="prod-body">
        <div class="prod-cat">${p.cat}</div>
        <div class="prod-name">${p.name}</div>
        <div class="prod-desc">${p.desc}</div>
        <div class="prod-footer">
          <div>
            ${p.precioAntes ? `<div class="prod-precio-antes">${fmt(p.precioAntes)}</div>` : ''}
            <div class="prod-precio">${fmt(p.price)}</div>
          </div>
          <button class="btn-add" onclick="addCart(${p.id})">+ AGREGAR</button>
        </div>
      </div>
    </div>
  `).join('');
}

// ── INICIO ────────────────────────────────────────────────────────────────────
updateCartUI();
renderCat(prods);
</script>
</body>
</html>
